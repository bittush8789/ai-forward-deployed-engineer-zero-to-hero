<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forward Deployed Engineering</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="logo-container">
      <h1>🚀 Delivery Portal</h1>
      <p>Enterprise AI Platform Academy</p>
    </div>
    
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search modules, tasks...">
    </div>
    
    <nav class="module-list" id="module-list">
      <!-- Populated dynamically via JS -->
    </nav>
  </aside>

  <!-- Main Work area -->
  <main class="main-content">
    <header class="header">
      <h2>Curriculum Dashboard</h2>
      <div>
        <a href="../README.md" class="btn">View README</a>
        <button class="btn btn-accent" onclick="alert('Verification check passed. FDE delivery templates and validation calculators are healthy.')">Verify Env</button>
      </div>
    </header>

    <section class="content-pane" id="content-area">
      <!-- Welcome panel by default -->
      <div class="welcome-screen">
        <h3>Welcome to the FDE Delivery Academy</h3>
        <p>Select any module from the sidebar navigation panel to begin your learning path. Each module contains extensive systems theory and step-by-step practical implementation labs.</p>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
